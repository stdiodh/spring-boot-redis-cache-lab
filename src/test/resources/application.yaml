spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  mail:
    host: localhost
    port: 2525
    username: test@example.com
    password: test-password
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - profile
              - email
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

springdoc:
  swagger-ui:
    enabled: false

jwt:
  secret: "change-this-secret-for-sequence-05-change-this-secret"
  expiration-ms: 3600000

app:
  frontend-url: "http://localhost:8080/auth-demo.html"
  password-reset-url: "http://localhost:8080/auth-demo.html"
