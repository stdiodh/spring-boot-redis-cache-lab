<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 60 640 470" role="img" aria-labelledby="title desc">
  <title id="title">Redis cache 상태 순환</title>
  <desc id="desc">상태·데이터 레이어에서 Redis entry가 비어 있으면 MySQL 원본을 읽어 Redis 파생본을 채우고, hit이면 MySQL을 건너뛰며, TTL 경과 또는 쓰기 성공 뒤 삭제로 다시 empty 상태가 되는 순환</desc>
  <metadata>Source: docs/theory.md, docs/implementation.md, docs/checklist.md. Original repository-local diagram. License: repository project terms; no external visual assets.</metadata>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10Z" fill="#2955E4"/></marker>
    <marker id="return-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10Z" fill="#176F72"/></marker>
    <style>
      text{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#111B3F}
      .node{stroke-width:3}
      .layer-outside{fill:#F1F5F9;stroke:#5B677A}
      .layer-interface{fill:#E6F4F7;stroke:#0E7490}
      .layer-application{fill:#F2EDFF;stroke:#6D43A8}
      .layer-resource{fill:#EAF5EE;stroke:#2C7352}
      .layer-integration{fill:#FFF4D6;stroke:#926000}
      .layer-runtime{fill:#EEF2F7;stroke:#52627A}
      [data-layer="outside"] .layer{fill:#5B677A}
      [data-layer="resource"] .layer{fill:#2C7352}
      .state-panel{fill:#FFFFFF;stroke:#64748B;stroke-width:2.5}
      .state-panel line{stroke:#C9D6F3;stroke-width:2}
      .flow{fill:none;stroke:#2955E4;stroke-width:4;marker-end:url(#arrow)}
      .return{fill:none;stroke:#176F72;stroke-width:4;marker-end:url(#return-arrow)}
      .expire{fill:none;stroke:#64748B;stroke-width:3;stroke-dasharray:10 8;marker-end:url(#arrow)}
      .layer-band{font-size:25px;font-weight:850;fill:#2C7352;text-anchor:middle}
      .utility{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:24px;font-weight:850}
      .name{font-size:27px;font-weight:850}
      .body{font-size:24px;font-weight:650;fill:#4B587C}
      .state-name{font-size:25px;font-weight:850}
      .state-body{font-size:24px;font-weight:650;fill:#4B587C}
    </style>
  </defs>
  <rect width="640" height="540" fill="#F8F9FB"/>
  <text class="layer-band" x="320" y="85">상태·데이터</text>

  <g data-layer="resource">
    <rect class="node layer-resource" x="24" y="102" width="255" height="116" rx="14"/>
    <text class="utility" x="46" y="147">EMPTY</text>
    <text class="body" x="46" y="190">entry 없음</text>
  </g>
  <path class="flow" d="M279 160H347"/>
  <text class="utility" x="287" y="142">MISS</text>
  <g data-layer="resource">
    <rect class="node layer-resource" x="359" y="102" width="257" height="116" rx="14"/>
    <text class="utility" x="381" y="147">DB READ</text>
    <text class="name" x="381" y="190">MySQL 원본 row</text>
  </g>

  <path class="flow" d="M487 218V244"/>
  <g data-layer="resource">
    <rect class="node layer-resource" x="359" y="256" width="257" height="138" rx="14"/>
    <text class="utility" x="381" y="297">REDIS FILL</text>
    <text class="name" x="381" y="331">entry + TTL 저장</text>
    <text class="body" x="381" y="367">원본에서 만든 복사본</text>
  </g>
  <path class="return" d="M359 316H291"/>
  <text class="utility" x="299" y="298">HIT</text>
  <g data-layer="resource">
    <rect class="node layer-resource" x="24" y="256" width="255" height="138" rx="14"/>
    <text class="utility" x="46" y="297">CACHE HIT</text>
    <text class="name" x="46" y="331">Redis 응답</text>
    <text class="body" x="46" y="367">MySQL 조회 생략</text>
  </g>

  <path class="return" d="M487 394V410"/>
  <g data-semantic="state">
    <rect class="state-panel" x="24" y="422" width="592" height="92" rx="14"/>
    <line x1="320" y1="435" x2="320" y2="501"/>
    <text class="state-name" x="48" y="457">TTL 경과</text>
    <text class="state-body" x="48" y="489">다음 조회가 refill</text>
    <text class="state-name" x="344" y="457">쓰기 성공 + DEL</text>
    <text class="state-body" x="344" y="489">TTL을 기다리지 않고 제거</text>
  </g>
  <path class="expire" d="M92 422C10 378 12 260 68 226"/>
</svg>
